spring.application.name=backend

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/getoffer?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&characterEncoding=utf8}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:change-this-secret-key-to-a-long-random-value-for-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# Demo data
app.seed-demo-data=${APP_SEED_DEMO_DATA:false}
app.upload-dir=${APP_UPLOAD_DIR:uploads}

# DeepSeek / OpenAI-compatible chat endpoint
deepseek.base-url=${DEEPSEEK_BASE_URL:https://openrouter.fans}
deepseek.api-key=${DEEPSEEK_API_KEY:}
deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}

# Upload
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Server
server.port=8080
